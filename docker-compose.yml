services:
  postgres:
    image: postgres:15
    container_name: apex_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: apex_finance
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: apex_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Sync working_dir with where you are mounting the volume
    working_dir: /app
    container_name: apex_backend
    volumes:
      - ./backend:/app
    # Using python -m uvicorn is safer in Docker
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_HOST=redis

  frontend:
    build:
      context: ./frontend
    container_name: apex_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    depends_on:
      - backend

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    container_name: apex_worker
    volumes:
      - ./backend:/app
    command: python -m celery -A celery_app worker --loglevel=info -P eventlet --concurrency=1
    depends_on:
      - redis
      - postgres
      - backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - REDIS_HOST=redis

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    container_name: apex_beat
    volumes:
      - ./backend:/app
    command: python -m celery -A celery_app beat --loglevel=info
    depends_on:
      - redis
      - backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}`
